<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 320 200">
  <!-- 3D metallic infinity ribbon — filled shape approach
       Each half is a ribbon (outer edge + inner edge) forming one loop
       Diagonal crossing arms create natural diamond gap at center -->

  <defs>
    <linearGradient id="rt" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="re" x1="0.4" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0E7490"/>
      <stop offset="100%" stop-color="#085E75"/>
    </linearGradient>
    <linearGradient id="lt" x1="0.7" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="le" x1="0.6" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#065F46"/>
    </linearGradient>
  </defs>

  <!-- ===== RIGHT ARM (BEHIND) — cyan ===== -->
  <!-- Enters upper-right of crossing, loops right, exits lower-left of crossing -->

  <!-- Edge (3D thickness — same shape offset down 8px) -->
  <path d="
    M 188 62
    C 218 18  268 0  300 22
    C 332 44  338 82  334 112
    C 330 142  312 178  272 192
    C 232 206  192 178  154 146

    C 146 140  138 132  132 124

    C 162 148  210 170  252 170
    C 290 170  316 148  320 112
    C 324 76  308 42  278 22
    C 248 2  204 18  176 48

    C 180 54  184 58  188 62
    Z
  " fill="url(#re)"/>

  <!-- Top face -->
  <path d="
    M 188 54
    C 218 10  268 -8  300 14
    C 332 36  338 74  334 104
    C 330 134  312 170  272 184
    C 232 198  192 170  154 138

    C 146 132  138 124  132 116

    C 162 140  210 162  252 162
    C 290 162  316 140  320 104
    C 324 68  308 34  278 14
    C 248 -6  204 10  176 40

    C 180 46  184 50  188 54
    Z
  " fill="url(#rt)"/>

  <!-- ===== LEFT ARM (IN FRONT) — green ===== -->
  <!-- Enters upper-left of crossing, loops left, exits lower-right of crossing -->

  <!-- Edge -->
  <path d="
    M 132 62
    C 102 18  52 0  20 22
    C -12 44  -18 82  -14 112
    C -10 142  8 178  48 192
    C 88 206  128 178  166 146

    C 174 140  182 132  188 124

    C 158 148  110 170  68 170
    C 30 170  4 148  0 112
    C -4 76  12 42  42 22
    C 72 2  116 18  144 48

    C 140 54  136 58  132 62
    Z
  " fill="url(#le)"/>

  <!-- Top face -->
  <path d="
    M 132 54
    C 102 10  52 -8  20 14
    C -12 36  -18 74  -14 104
    C -10 134  8 170  48 184
    C 88 198  128 170  166 138

    C 174 132  182 124  188 116

    C 158 140  110 162  68 162
    C 30 162  4 140  0 104
    C -4 68  12 34  42 14
    C 72 -6  116 10  144 40

    C 140 46  136 50  132 54
    Z
  " fill="url(#lt)"/>
</svg>
