apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ping-user
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: user
    app.kubernetes.io/part-of: ping
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ping-user
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-user
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: user
        app.kubernetes.io/part-of: ping
    spec:
      containers:
        - name: user
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - { name: http, containerPort: {{ .Values.service.targetPort }}, protocol: TCP }
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PORT, value: "{{ .Values.service.targetPort }}" }
            - { name: LOG_LEVEL, value: info }
            - name: POSTGRES_URL
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: POSTGRES_URL } }
            - name: JWT_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: JWT_SECRET } }
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet: { path: {{ .Values.healthcheck.liveness.path }}, port: http }
            initialDelaySeconds: {{ .Values.healthcheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.liveness.periodSeconds }}
          readinessProbe:
            httpGet: { path: {{ .Values.healthcheck.readiness.path }}, port: http }
            initialDelaySeconds: {{ .Values.healthcheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.readiness.periodSeconds }}
      restartPolicy: Always
