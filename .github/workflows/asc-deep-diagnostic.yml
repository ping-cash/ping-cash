name: ASC Deep Diagnostic
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try: key = base64.b64decode(key_b64, validate=False)
          except: key = key_b64.encode()
          if b'PRIVATE KEY' not in key: key = key_b64.encode()
          token = jwt.encode({'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                              'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
                             key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}')

          def probe(label, path):
              print(f'\n=== {label} === GET {path}')
              r = requests.get(f'{base}{path}', headers=h)
              print(f'HTTP {r.status_code}')
              if r.status_code == 200:
                  print(json.dumps(r.json(), indent=2)[:1500])
              else:
                  print(r.text[:500])

          # 1. ALL preReleaseVersions across both platforms (no version filter)
          probe('All pre-release versions (IOS)',
                f'/v1/preReleaseVersions?filter[app]={app_id}&filter[platform]=IOS&limit=50')

          # 2. Get the prereleaseVersion id for 0.1.0 and list ITS builds via relationship
          r = requests.get(f'{base}/v1/preReleaseVersions?filter[app]={app_id}&filter[version]=0.1.0&filter[platform]=IOS', headers=h).json()
          if r.get('data'):
              prv_id = r['data'][0]['id']
              print(f'\nPreReleaseVersion 0.1.0 id: {prv_id}')
              probe('Builds via preReleaseVersion relationship',
                    f'/v1/preReleaseVersions/{prv_id}/builds?sort=-version&limit=50')
              probe('Build relationships ids',
                    f'/v1/preReleaseVersions/{prv_id}/relationships/builds')

          # 3. App-level: builds with no filter, just sorted desc by uploadedDate
          probe('Builds ALL (no filter)',
                f'/v1/builds?filter[app]={app_id}&sort=-uploadedDate&limit=50&include=buildBundles')

          # 4. App store version submissions (catches if a build went straight to review)
          probe('App store versions',
                f'/v1/apps/{app_id}/appStoreVersions?sort=-createdDate&limit=10')

          # 5. Beta app review submissions
          probe('Beta app review submissions',
                f'/v1/betaAppReviewSubmissions?filter[build.app]={app_id}&limit=10')

          # 6. Beta groups + tester invitations (proves auth works at this scope)
          probe('Beta groups',
                f'/v1/betaGroups?filter[app]={app_id}&limit=10')

          # 7. App pricing readiness
          probe('App price schedule',
                f'/v1/apps/{app_id}/relationships/appPriceSchedule')
          PY
