image: { repository: ghcr.io/ping-cash/notify-service, tag: "" }
replicas: 2
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }
service: { port: 3008, targetPort: 3008 }
secrets:
  external:
    enabled: true
    storeName: openbao-cluster
    paths:
      whatsappPhoneNumberId: ping/whatsapp/phone_number_id
      whatsappAccessToken: ping/whatsapp/access_token
      twilioAccountSid: ping/twilio/account_sid
      twilioAuthToken: ping/twilio/auth_token
      twilioFromNumber: ping/twilio/from_number
istio:
  virtualService:
    enabled: false  # Internal-only
healthcheck:
  liveness: { path: /healthz, initialDelaySeconds: 5, periodSeconds: 30 }
  readiness: { path: /readyz, initialDelaySeconds: 5, periodSeconds: 10 }
