# DoD Method-1 surface: Receive tab phone | wallet toggle (ADR 0024).
#
# Pass criteria:
#   - Receive screen renders both Phone and Wallet modes
#   - Wallet mode exposes Solana address + copy button
#   - USDC/USDT warning visible
appId: cash.ping.app
---
# Per 00-all.yaml ordering this runs immediately after 03-tabs.yaml
# which ends with tap tab-Home — so we're already on the home tab.
# ActionTile component on home sets testID=`btn-${label}`.
- extendedWaitUntil:
    visible:
      id: 'btn-Send'
    timeout: 8000
- tapOn:
    id: 'btn-Receive'
- extendedWaitUntil:
    visible:
      id: 'receive-mode-phone'
    timeout: 8000
- tapOn:
    id: 'receive-mode-wallet'
- assertVisible:
    id: 'receive-wallet-address'
- assertVisible: 'Send USDC or USDT on Solana'
- tapOn:
    id: 'receive-mode-phone'
- assertVisible: 'YOUR PHONE'
- back
