{{- if .Values.istio.virtualService.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ping-wallet
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  hosts:
    {{- range .Values.istio.virtualService.hosts }}
    - {{ . | quote }}
    {{- end }}
  gateways: [istio-system/ingress]
  http:
    - match: [{ uri: { prefix: {{ .Values.istio.virtualService.matchPrefix }} } }]
      route:
        - destination:
            host: {{ .Release.Name }}.{{ .Release.Namespace }}.svc.cluster.local
            port: { number: {{ .Values.service.port }} }
      timeout: 10s
{{- end }}
