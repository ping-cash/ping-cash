appId: cash.ping.app
---
- tapOn: 'Create account'
- extendedWaitUntil:
    visible: 'phone number'
    timeout: 25000
- takeScreenshot: 02-signup
# Hard-target the phone input now that it has a testID. The input
# default value is the user's IDD prefix from expo-localization (or
# '+' fallback), so we only need to type the digits — Maestro's iOS
# phone-pad keyboard can't type the literal '+'.
- tapOn:
    id: 'phone-input'
- inputText: '447700900789'
# Tap the Send button by testID. signup.tsx is now wrapped in
# ScrollView with sticky-bottom actions — the keyboard no longer
# covers the button, so we don't need hideKeyboard (which is brittle
# on iOS sims that don't expose a standard dismiss action).
- tapOn:
    id: 'btn-Send verification code'
- extendedWaitUntil:
    visible: 'Check your phone'
    timeout: 15000
- takeScreenshot: 03-verify
# OTP test code: OTP_TEST_PHONES bypass accepts 123456 for
# +447700900* numbers (per auth.service.ts isTestPhone bypass).
- inputText: '123456'
# Auto-submit handler triggers when the 6th digit lands
# (8dcf14b 3-tap onboarding fix), so we just need to wait for the
# dashboard. The button tap is also a safe no-op if auto-submit
# already fired — keep it for robustness across builds.
- runFlow:
    when:
      visible:
        id: 'btn-Verify and continue'
    commands:
      - tapOn:
          id: 'btn-Verify and continue'
