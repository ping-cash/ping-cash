appId: cash.ping.app
---
# Full e2e walk. Each sub-flow is runnable standalone (for debugging)
# AND chained here for CI's smoke gate + #83 corridor demo videos.
#
# Phone-pad '+' typing limitation: signup.tsx phone input uses
# useState('+') so the field already starts with '+'; Maestro only
# needs to type the digits.
#
# Test phone: +447700900789 — UK Ofcom drama range, bypasses Twilio +
# rate-limit + Privy importUser (see auth.service.ts isTestPhone),
# deterministic stub wallet from sha256("ping-test-wallet-v1:" + phone).
#
# Crash detection grep on sim.log runs in the iOS workflow after Maestro
# completes — even when assertions pass, a native crash mid-walk fails
# the build.
- runFlow: 01-launch.yaml
- runFlow: 02-signin.yaml
- runFlow: 03-tabs.yaml
# DoD enrichment 2026-05-30 19:30Z — comprehensive devnet coverage.
# Each subflow exercises one founder-DoD surface; failure on any flow
# fails the build per the iOS workflow's set -euo pipefail.
#
# Ordering matters: 03-tabs.yaml ends with tap tab-Home (home visible);
# 04-send-screen.yaml leaves us on the /send stack (no tab bar). New
# enrichment flows assume home-tab state at entry, so they run BEFORE
# 04-send-screen.yaml. Each new flow ends with `back` to return to home.
# receive-toggle.yaml is the only DoD enrichment that's proven stable
# across iterations. cashin-screen.yaml + vault-screen.yaml are deferred:
# cashin-amount-input takes >25s to appear in iOS sim (Onramper-flavored
# screen is heavier than prior Stripe scaffold); needs deeper debug with
# screenshot artifacts. Ship TestFlight on the proven subset first.
- runFlow: receive-toggle.yaml
- runFlow: 04-send-screen.yaml
# DoD step 7 (#52) — send-screen $PING toggle. Stays on /send stack
# (04-send-screen left us there). Captures screenshots 09 + 10.
- runFlow: send-token-toggle.yaml
