<head>

<title>Cinova — Tab Icon Catalog 5×10</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    padding: 32px 24px 120px;
    min-height: 100vh;
  }
  h1 { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 28px; }

  table {
    border-collapse: collapse;
    width: 100%;
    max-width: 820px;
  }
  th {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #888;
    padding: 6px 4px 12px;
    text-align: center;
  }
  th:first-child { text-align: left; color: #444; width: 32px; }

  td {
    padding: 5px 4px;
    text-align: center;
    vertical-align: middle;
  }
  td:first-child {
    font-size: 11px;
    color: #444;
    font-weight: 600;
    text-align: left;
    padding-right: 10px;
  }

  .icon-cell {
    cursor: pointer;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    padding: 10px 8px;
    border-radius: 10px;
    border: 1.5px solid transparent;
    transition: all 0.15s;
    min-width: 72px;
  }
  .icon-cell:hover { background: #1a1a28; border-color: #333; }
  .icon-cell.selected {
    background: #1a1033;
    border-color: #7c3aed;
    box-shadow: 0 0 0 1px #7c3aed44;
  }
  .icon-cell svg { display: block; }
  .icon-label {
    font-size: 9px;
    color: #555;
    letter-spacing: 0.03em;
    white-space: nowrap;
  }
  .icon-cell.selected .icon-label { color: #9c7ce0; }

  /* Sticky preview bar */
  #preview-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #13131e;
    border-top: 1px solid #222;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 0;
    height: 72px;
    z-index: 100;
  }
  .preview-tab {
    flex: 1;
    max-width: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 10px 4px 8px;
  }
  .preview-tab.active svg * { fill: #8b5cf6 !important; stroke: #8b5cf6 !important; }
  .preview-tab.active .preview-label { color: #8b5cf6; }
  .preview-label { font-size: 10px; color: #555; }
  .preview-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #8b5cf6;
    margin-top: 2px;
  }
  #selection-hint {
    position: fixed;
    bottom: 76px; left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    color: #555;
    padding: 4px;
    background: #0a0a0f;
    border-top: 1px solid #1a1a1a;
  }
</style>
</head>

    { label: 'Checkmark', svg: `<circle cx="22" cy="15" r="8" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M5 38 Q5 26 22 26 Q39 26 39 38" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><polyline points="28,11 32,8 39,5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>` },
    { label: 'Silhouette', svg: `<path d="M22 4 C16 4 12 8 12 14 C12 18 14 22 18 24 C12 26 6 31 6 40 H38 C38 31 32 26 26 24 C30 22 32 18 32 14 C32 8 28 4 22 4 Z" fill="currentColor"/>` },
    { label: 'Two People', svg: `<circle cx="15" cy="14" r="6" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 36 Q4 26 15 26 Q20 26 24 29" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="29" cy="12" r="7" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M18 36 Q18 24 29 24 Q40 24 40 36" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>` },
    { label: 'ID Card', svg: `<rect x="5" y="10" width="34" height="26" rx="3" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="16" cy="21" r="5" fill="none" stroke="currentColor" stroke-width="2"/><line x1="25" y1="19" x2="34" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="25" y1="24" x2="32" y2="24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M9 36 Q9 31 16 31 Q23 31 23 36" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>` },
  ]},
];

// ── State ────────────────────────────────────────────────────────────────────
const selected = [0, 0, 0, 0, 0]; // row index (0-based) per column

// ── Build table ──────────────────────────────────────────────────────────────
function makeSvg(svgContent, color = '#555', size = 40) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="${size}" height="${size}" style="color:${color}">${svgContent}</svg>`;
}

const tbody = document.getElementById('tbody');
for (let row = 0; row < 10; row++) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${row + 1}</td>`;
  for (let col = 0; col < 5; col++) {
    const icon = COLS[col].icons[row];
    const td = document.createElement('td');
    const cell = document.createElement('div');
    cell.className = 'icon-cell' + (row === 0 ? ' selected' : '');
    cell.innerHTML = makeSvg(icon.svg, row === 0 ? '#8b5cf6' : '#555') +
      `<span class="icon-label">${icon.label}</span>`;
    cell.dataset.col = col;
    cell.dataset.row = row;
    cell.addEventListener('click', () => pick(col, row, cell));
    td.appendChild(cell);
    tr.appendChild(td);
  }
  tbody.appendChild(tr);
}

// ── Pick handler ─────────────────────────────────────────────────────────────
function pick(col, row, clickedCell) {
  // Deselect old
  const oldRow = selected[col];
  const oldCell = document.querySelector(`.icon-cell[data-col="${col}"][data-row="${oldRow}"]`);
  if (oldCell) {
    oldCell.classList.remove('selected');
    const svg = oldCell.querySelector('svg');
    if (svg) svg.style.color = '#555';
  }
  // Select new
  selected[col] = row;
  clickedCell.classList.add('selected');
  const svg = clickedCell.querySelector('svg');
  if (svg) svg.style.color = '#8b5cf6';
  updatePreview();
}

// ── Preview bar ──────────────────────────────────────────────────────────────
function updatePreview() {
  const colNames = ['Home', 'Reels', 'Discover', 'Watchlist', 'Profile'];
  for (let col = 0; col < 5; col++) {
    const row = selected[col];
    const icon = COLS[col].icons[row];
    document.getElementById(`pv-${col}`).innerHTML = makeSvg(icon.svg, '#8b5cf6', 26);
  }
  document.getElementById('selection-hint').textContent =
    colNames.map((n, i) => `${n}:${selected[i] + 1}`).join(' · ');
}

updatePreview();
</script>
