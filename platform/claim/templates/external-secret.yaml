{{- if .Values.secrets.external.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: {{ .Release.Name }}-secrets }
spec:
  refreshInterval: 60s
  secretStoreRef: { name: {{ .Values.secrets.external.storeName }}, kind: ClusterSecretStore }
  target: { name: {{ .Release.Name }}-secrets, creationPolicy: Owner }
  data:
    - { secretKey: REDIS_URL, remoteRef: { key: {{ .Values.secrets.external.paths.redisUrl }} } }
    - { secretKey: TWILIO_ACCOUNT_SID, remoteRef: { key: {{ .Values.secrets.external.paths.twilioAccountSid }} } }
    - { secretKey: TWILIO_AUTH_TOKEN, remoteRef: { key: {{ .Values.secrets.external.paths.twilioAuthToken }} } }
    - { secretKey: TWILIO_VERIFY_SID, remoteRef: { key: {{ .Values.secrets.external.paths.twilioVerifySid }} } }
    - { secretKey: CLAIM_URL_BASE, remoteRef: { key: {{ .Values.secrets.external.paths.claimUrlBase }} } }
{{- end }}
