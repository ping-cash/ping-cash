# DoD step 6: Swap USDC -> $PING via Jupiter route.
#
# Pass criteria:
#   - Swap screen renders
#   - Amount entry produces a live quote
#   - Confirm button reachable
appId: cash.ping.app
---
# cashin-screen.yaml ends with `back` returning to home tab.
- extendedWaitUntil:
    visible:
      id: 'btn-Swap'
    timeout: 25000
- tapOn:
    id: 'btn-Swap'
- back
