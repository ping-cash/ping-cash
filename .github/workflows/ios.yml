# iOS build + TestFlight upload for Ping. Adapted from dynolabs-io/vcard's
# ios.yml — same Apple Developer team + cert/signing strategy, but:
#   - pnpm monorepo (cd into apps/mobile)
#   - bundle ID cash.ping.app + app scheme "cash" (per app.json slug)
#   - Maestro E2E gate omitted (no .maestro/ flows yet)
#
# Prerequisite: bootstrap-asc.yml must have run once to register bundle ID
# + create the App Store Connect app shell + create "Founders" beta group.

name: iOS TestFlight
on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: apps/mobile

env:
  PROFILE_NAME: 'Ping App Store'
  APP_IDENTIFIER: 'cash.ping.app'
  BETA_GROUP_NAME: 'Founders'

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        # Version comes from package.json packageManager field — don't
        # specify here or pnpm/action-setup errors "Multiple versions".

      - name: Select latest-stable Xcode (iOS 26 SDK required by Apple as of 2026-04)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install workspace deps
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Generate native iOS project via expo prebuild
        run: npx expo prebuild --platform ios --no-install --clean

      - name: Bump CFBundleVersion to GitHub run number
        run: |
          for plist in ios/*/Info.plist; do
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$plist"
            echo "  $plist → CFBundleVersion=${{ github.run_number }}"
          done

      - name: Patch Podfile — no signing on Pods + SKIP_INSTALL=NO on app target
        run: |
          python3 << 'PY'
          import re
          p = open('ios/Podfile').read()
          snippet = """
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED']  = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['CODE_SIGN_IDENTITY']    = ''
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
              end
            end
            installer.aggregate_targets.each do |agg|
              agg.user_project.targets.each do |target|
                target.build_configurations.each do |config|
                  if config.name == 'Release'
                    config.build_settings['SKIP_INSTALL'] = 'NO'
                    config.build_settings['INSTALL_PATH'] = '$(LOCAL_APPS_DIR)'
                    config.build_settings['DEPLOYMENT_LOCATION'] = 'YES'
                  end
                end
              end
              agg.user_project.save
            end
          """
          new, n = re.subn(r'(post_install do \|installer\|\s*\n)', r'\1' + snippet, p, count=1)
          if n == 0:
              new = p + "\npost_install do |installer|\n" + snippet + "end\n"
          open('ios/Podfile', 'w').write(new)
          print('Podfile patched')
          PY

      - run: cd ios && pod install

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/private_keys
          # PRIVATE_KEY secret is base64-encoded (matches vcard convention).
          echo "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" \
            | base64 -d > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          chmod 600 ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8

      - name: Create empty keychain (cert created by fastlane cert)
        run: |
          set -euo pipefail
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" || true
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed s/\"//g)
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Fetch fresh App Store provisioning profile via fastlane
        env:
          FASTLANE_HIDE_CHANGELOG: '1'
          FASTLANE_SKIP_UPDATE_CHECK: '1'
        run: |
          set -euo pipefail
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          export KEY_FILE=$HOME/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
          export API_JSON=$RUNNER_TEMP/asc_api_key.json
          export ASC_KEY_ID="${{ secrets.APP_STORE_CONNECT_KEY_ID }}"
          export ASC_ISSUER_ID="${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"
          python3 - <<'PY'
          import json, os
          pem = open(os.environ['KEY_FILE']).read()
          obj = { 'key_id': os.environ['ASC_KEY_ID'],
                  'issuer_id': os.environ['ASC_ISSUER_ID'],
                  'key': pem, 'duration': 1200, 'in_house': False }
          with open(os.environ['API_JSON'], 'w') as f:
              json.dump(obj, f)
          PY
          pip3 install --quiet --break-system-packages --user pyjwt cryptography 2>&1 | tail -2 || true
          # Pre-revoke oldest dist cert + purge any existing Ping profile so
          # fastlane sigh can pin the profile to a fresh cert in this runner's
          # keychain. Same logic as vcard's ios.yml.
          python3 - <<'PY'
          import json, os, sys, time, base64, urllib.request, urllib.error, urllib.parse, site
          for p in site.getusersitepackages() if isinstance(site.getusersitepackages(), list) else [site.getusersitepackages()]:
              if p not in sys.path: sys.path.insert(0, p)
          import jwt as pyjwt
          pem = open(os.environ['KEY_FILE']).read()
          tok = pyjwt.encode(
              {'iss': os.environ['ASC_ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              pem, algorithm='ES256', headers={'kid': os.environ['ASC_KEY_ID'], 'typ': 'JWT'})
          if isinstance(tok, bytes): tok = tok.decode()
          hdrs = {'Authorization': f'Bearer {tok}', 'Accept': 'application/json'}
          # Cert list
          req = urllib.request.Request('https://api.appstoreconnect.apple.com/v1/certificates?limit=200', headers=hdrs)
          data = json.load(urllib.request.urlopen(req))
          certs = [c for c in data.get('data', [])
                   if c['attributes'].get('certificateType') in {'DISTRIBUTION', 'IOS_DISTRIBUTION'}]
          print(f'existing distribution certs: {len(certs)}')
          for c in certs:
              a = c.get('attributes', {})
              print(f"  - id={c['id']} type={a.get('certificateType')} expires={a.get('expirationDate')}")
          if len(certs) >= 2:
              certs.sort(key=lambda c: c['attributes'].get('expirationDate') or '')
              victim = certs[0]
              print(f'revoking oldest: {victim["id"]}')
              dreq = urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com/v1/certificates/{victim["id"]}',
                  headers=hdrs, method='DELETE')
              try: urllib.request.urlopen(dreq).read(); print('  revoked OK')
              except urllib.error.HTTPError as e: print(f'  HTTP {e.code}: {e.read().decode()[:200]}')
          # Purge existing Ping profile by name
          PROFILE_NAME = 'Ping App Store'
          preq = urllib.request.Request(
              f'https://api.appstoreconnect.apple.com/v1/profiles?filter[name]={urllib.parse.quote(PROFILE_NAME)}&limit=200',
              headers=hdrs)
          try: pdata = json.load(urllib.request.urlopen(preq))
          except urllib.error.HTTPError as e: print(f'profiles list HTTP {e.code}'); pdata = {'data': []}
          for p in pdata.get('data', []):
              print(f'deleting profile {p["id"]} ({p["attributes"].get("name")})')
              try: urllib.request.urlopen(urllib.request.Request(
                  f'https://api.appstoreconnect.apple.com/v1/profiles/{p["id"]}',
                  headers=hdrs, method='DELETE')).read()
              except urllib.error.HTTPError as e: print(f'  HTTP {e.code}')
          PY
          fastlane cert \
            --api_key_path "$API_JSON" \
            --team_id ${{ secrets.APPLE_TEAM_ID }} \
            --output_path $RUNNER_TEMP \
            --keychain_path "$KEYCHAIN_PATH" \
            --keychain_password "$KEYCHAIN_PASSWORD" \
            2>&1 | tee "$RUNNER_TEMP/cert.log"
          NEW_CERT_ID=$(grep -oE 'Successfully generated [A-Z0-9]{10}|Found the certificate [A-Z0-9]{10}' "$RUNNER_TEMP/cert.log" \
            | head -1 | awk '{print $NF}')
          if [ -z "$NEW_CERT_ID" ]; then
            echo "::error::Could not parse cert ID from fastlane cert output"
            cat "$RUNNER_TEMP/cert.log"; exit 1
          fi
          echo "Pinning sigh to cert ID: $NEW_CERT_ID"
          for p12 in "$RUNNER_TEMP"/*.p12; do
            [ -f "$p12" ] || continue
            security import "$p12" -P "" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" || true
          done
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" >/dev/null 2>&1 || true
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          fastlane sigh renew \
            --api_key_path "$API_JSON" \
            --app_identifier ${{ env.APP_IDENTIFIER }} \
            --team_id ${{ secrets.APPLE_TEAM_ID }} \
            --provisioning_name "${{ env.PROFILE_NAME }}" \
            --output_path $RUNNER_TEMP \
            --filename dist.mobileprovision \
            --cert_id "$NEW_CERT_ID" \
            --force
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<<"$(security cms -D -i $RUNNER_TEMP/dist.mobileprovision)")
          echo "Fresh profile UUID: $UUID"
          cp $RUNNER_TEMP/dist.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision

      # ───────────────────────────────────────────────────────────
      # SIMULATOR E2E GATE — runs BEFORE archive/upload.
      # If the app crashes on launch or any Maestro flow fails, this
      # job exits non-zero, archive + altool upload steps are skipped,
      # and the broken build NEVER reaches Apple/TestFlight. Adopted
      # verbatim from dynolabs-io/vcard's proven ios.yml after a
      # founder-reported crash on the first revamp build (2026-05-28).
      # ───────────────────────────────────────────────────────────
      - name: Discover scheme
        id: scheme
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          APP_SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "scheme=$APP_SCHEME" >> $GITHUB_OUTPUT
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "Discovered scheme: $APP_SCHEME from workspace $WORKSPACE"

      - name: Force SKIP_INSTALL=NO on the app target (pbxproj surgical patch)
        # Xcode 26 emits an empty Products/Applications dir because the
        # auto-generated project sets SKIP_INSTALL=YES on every target.
        # The Podfile post_install hook above sets it on aggregate targets
        # but NOT on the app's native target. Without this surgical patch
        # the simulator build produces frameworks but no .app, and the
        # archive ships an .ipa with empty Payload/Applications/.
        run: |
          python3 << 'PY'
          import re, glob
          for pbx in glob.glob('ios/*.xcodeproj/project.pbxproj'):
              if 'Pods' in pbx: continue
              data = open(pbx).read()
              target_re = re.compile(r'([0-9A-F]{24})\s*/\*\s*[^*]+\s*\*/\s*=\s*\{\s*isa = PBXNativeTarget;[^}]*?productType = "com\.apple\.product-type\.application";', re.S)
              app_targets = target_re.findall(data)
              print(f'app targets: {app_targets}')
              for tid in app_targets:
                  m = re.search(rf'{tid}\s*/\*[^*]+\*/\s*=\s*\{{[^}}]*?buildConfigurationList = ([0-9A-F]{{24}})', data, re.S)
                  if not m: continue
                  list_id = m.group(1)
                  m2 = re.search(rf'{list_id}\s*/\*[^*]+\*/\s*=\s*\{{[^}}]*?buildConfigurations = \(([^)]+)\)', data, re.S)
                  if not m2: continue
                  cfg_block = m2.group(1)
                  release_id_match = re.search(r'([0-9A-F]{24})\s*/\*\s*Release\s*\*/', cfg_block)
                  if not release_id_match: continue
                  rel_id = release_id_match.group(1)
                  pattern = re.compile(rf'({rel_id}\s*/\*[^*]+\*/\s*=\s*\{{\s*isa = XCBuildConfiguration;\s*buildSettings = \{{)', re.S)
                  new = pattern.sub(r'\1\n\t\t\t\tSKIP_INSTALL = NO;\n\t\t\t\tINSTALL_PATH = "$(LOCAL_APPS_DIR)";', data, count=1)
                  if new != data:
                      data = new
                      print(f'  patched target {tid} release config {rel_id}')
              open(pbx, 'w').write(data)
          PY

      - name: Build app for iOS Simulator (no signing)
        run: |
          set -euo pipefail
          cd ios
          DEST=$(xcrun simctl list devices available --json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for runtime, devs in d['devices'].items():
              if 'iOS' not in runtime: continue
              for x in devs:
                  if 'iPhone' in x.get('name','') and x.get('isAvailable'):
                      print(f\"platform=iOS Simulator,id={x['udid']}\"); sys.exit(0)
          ")
          echo "destination: $DEST"
          xcodebuild build \
            -workspace "${{ steps.scheme.outputs.workspace }}" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -destination "$DEST" \
            -derivedDataPath $RUNNER_TEMP/sim-build \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=YES \
            ARCHS=arm64

      - name: Boot fresh iOS simulator
        run: |
          set -euo pipefail
          DEVICE_TYPE=$(xcrun simctl list devicetypes -j | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          for t in d['devicetypes']:
              if 'iPhone-16' in t['identifier'] or 'iPhone-15' in t['identifier']:
                  print(t['identifier']); break
          ")
          RUNTIME=$(xcrun simctl list runtimes -j | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          ios = [r for r in d['runtimes'] if r.get('isAvailable') and 'iOS' in r.get('name','')]
          ios.sort(key=lambda r: r['version'], reverse=True)
          print(ios[0]['identifier'] if ios else '')
          ")
          UDID=$(xcrun simctl create "ping-test-$RANDOM" "$DEVICE_TYPE" "$RUNTIME")
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b

      - name: Install app on simulator + pre-grant permissions
        run: |
          set -euo pipefail
          # Xcode 26 emits the .app as a symlink in
          # Build/Products/Release-iphonesimulator/*.app pointing at the
          # actual bundle in /tmp/<Scheme>.dst/Applications/. find -type d
          # SKIPS symlinks, so use plain glob + readlink -f to resolve.
          APP=$(ls -d $RUNNER_TEMP/sim-build/Build/Products/Release-iphonesimulator/*.app 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "::error::No .app produced by simulator build"
            find $RUNNER_TEMP/sim-build/Build/Products -maxdepth 3 -name "*.app"
            exit 1
          fi
          APP_RESOLVED=$(readlink -f "$APP" 2>/dev/null || echo "$APP")
          echo "Installing $APP_RESOLVED (resolved from $APP) onto $SIM_UDID"
          xcrun simctl install "$SIM_UDID" "$APP_RESOLVED"
          for perm in photos camera contacts microphone; do
            xcrun simctl privacy "$SIM_UDID" grant $perm ${{ env.APP_IDENTIFIER }} || true
          done

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Maestro flows + crash detection
        env:
          MAESTRO_DRIVER_STARTUP_TIMEOUT: '600000'
        run: |
          set -euo pipefail
          export PATH="$HOME/.maestro/bin:$PATH"
          maestro --version
          # Stream simulator log so we can grep for native crash signatures
          # even when Maestro itself reports the flow as passed.
          xcrun simctl spawn "$SIM_UDID" log stream --predicate 'process == "Ping" OR process == "Pong" OR process == "cash"' \
            > $RUNNER_TEMP/sim.log 2>&1 &
          LOG_PID=$!
          set +e
          MAESTRO_SCREEN_DIR=$RUNNER_TEMP/maestro-screenshots
          mkdir -p "$MAESTRO_SCREEN_DIR"
          (
            cd "$MAESTRO_SCREEN_DIR" && \
            maestro --device "$SIM_UDID" test \
              --format=junit \
              --output="$RUNNER_TEMP/maestro-junit.xml" \
              "$GITHUB_WORKSPACE/apps/mobile/.maestro/00-all.yaml"
          )
          MAESTRO_EXIT=$?
          set -e
          kill $LOG_PID 2>/dev/null || true
          if [ -d ~/.maestro/tests ]; then
            mkdir -p $RUNNER_TEMP/maestro-debug
            cp -R ~/.maestro/tests $RUNNER_TEMP/maestro-debug/
          fi
          echo "=== Maestro screenshots captured ==="
          ls -la "$MAESTRO_SCREEN_DIR" || true
          # NATIVE-CRASH DETECTION — Maestro can pass even when a native
          # bridge crash happens (the JS ErrorBoundary doesn't catch it).
          if grep -qE "Terminating app due to uncaught exception|signal SIGABRT|EXC_BAD_ACCESS|libsystem_kernel\.dylib.*__pthread_kill|Fatal Exception" $RUNNER_TEMP/sim.log; then
            echo "::error::Native crash detected in sim.log — see uploaded artifacts"
            grep -nE "Terminating|SIGABRT|EXC_BAD_ACCESS|Fatal Exception" $RUNNER_TEMP/sim.log | head -40
            exit 1
          fi
          exit $MAESTRO_EXIT

      - name: Upload Maestro artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-results
          path: |
            ${{ runner.temp }}/maestro-junit.xml
            ${{ runner.temp }}/maestro-debug/**
            ${{ runner.temp }}/maestro-screenshots/**
            ${{ runner.temp }}/sim.log
          if-no-files-found: warn
      # ───────────────────────────────────────────────────────────
      # END E2E GATE — archive + upload only run if gate passed.
      # ───────────────────────────────────────────────────────────

      - name: Build + archive (manual signing)
        run: |
          cd ios
          xcodebuild archive \
            -workspace "${{ steps.scheme.outputs.workspace }}" \
            -scheme "${{ steps.scheme.outputs.scheme }}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/app.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_NAME }}"

      - name: Export IPA (manual zip from archive)
        run: |
          set -euo pipefail
          APP=$(find "$RUNNER_TEMP/app.xcarchive" -name "*.app" -type d | head -1 || true)
          if [ -z "$APP" ]; then
            echo "::error::No .app found in archive"; exit 1
          fi
          mkdir -p $RUNNER_TEMP/export/Payload
          cp -R "$APP" $RUNNER_TEMP/export/Payload/
          IPA_NAME=$(basename "$APP" .app).ipa
          cd $RUNNER_TEMP/export
          zip -qr "$IPA_NAME" Payload
          rm -rf Payload
          ls -la $RUNNER_TEMP/export/

      - name: Upload to TestFlight via altool
        run: |
          set -o pipefail
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            --type ios \
            --apiKey ${{ secrets.APP_STORE_CONNECT_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} 2>&1 | tee /tmp/altool.log
          if grep -qiE "UPLOAD FAILED|Validation failed|ERROR:" /tmp/altool.log; then
            echo "::error::altool reported failure"; exit 1
          fi
          echo "::notice::Upload succeeded"

      - name: Assign uploaded build to Founders beta group
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          BUNDLE_ID: ${{ env.APP_IDENTIFIER }}
          RUN_NUMBER: ${{ github.run_number }}
          BETA_GROUP_NAME: ${{ env.BETA_GROUP_NAME }}
        run: |
          python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json, sys
          key_b64 = os.environ['APP_STORE_CONNECT_PRIVATE_KEY']
          try:
              key = base64.b64decode(key_b64, validate=False)
              if b'PRIVATE KEY' not in key:
                  key = key_b64.encode()
          except Exception:
              key = key_b64.encode()
          token = jwt.encode(
              { 'iss': os.environ['APP_STORE_CONNECT_ISSUER_ID'],
                'iat': int(time.time()),
                'exp': int(time.time())+1200,
                'aud': 'appstoreconnect-v1' },
              key, algorithm='ES256',
              headers={ 'kid': os.environ['APP_STORE_CONNECT_KEY_ID'] })
          h = { 'Authorization': f'Bearer {token}' }
          base = 'https://api.appstoreconnect.apple.com'
          bundle_id = os.environ['BUNDLE_ID']
          run_number = os.environ['RUN_NUMBER']
          group_name = os.environ['BETA_GROUP_NAME']
          apps = requests.get(f'{base}/v1/apps?filter[bundleId]={bundle_id}', headers=h, timeout=20).json()
          if not apps.get('data'):
              print(f'::warning::App {bundle_id} not in ASC — skipping'); sys.exit(0)
          app_id = apps['data'][0]['id']
          groups = requests.get(f'{base}/v1/betaGroups?filter[app]={app_id}', headers=h, timeout=20).json()
          group = next((g for g in groups['data'] if g['attributes']['name'] == group_name), None)
          if not group:
              print(f'::warning::Beta group "{group_name}" not found — skipping'); sys.exit(0)
          group_id = group['id']
          build_id = None
          for attempt in range(30):
              builds = requests.get(f'{base}/v1/builds?filter[app]={app_id}&filter[version]={run_number}&limit=1', headers=h, timeout=20).json()
              if builds.get('data'):
                  build_id = builds['data'][0]['id']; break
              time.sleep(20)
          if not build_id:
              print(f'::warning::Build {run_number} not in ASC after 10 min'); sys.exit(0)
          rel = { 'data': [ { 'type': 'builds', 'id': build_id } ] }
          r = requests.post(f'{base}/v1/betaGroups/{group_id}/relationships/builds',
              headers={**h, 'Content-Type':'application/json'},
              data=json.dumps(rel), timeout=20)
          if r.status_code == 204:
              print(f'::notice::Build {run_number} assigned to "{group_name}" — TestFlight refresh will show it')
          else:
              print(f'::error::Assignment failed: HTTP {r.status_code} {r.text}'); sys.exit(1)
          PY
