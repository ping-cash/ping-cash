name: ASC Pilot Upload (diagnostic)
# Manually-dispatched: take the latest preserved IPA artifact and upload it
# via fastlane pilot (different code path than altool --upload-app). pilot
# typically gives more verbose Apple-side error messages and exposes silent
# rejections that altool hides.
on: { workflow_dispatch: {} }
jobs:
  pilot:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with: { ruby-version: '3.3' }
      - run: gem install fastlane --no-document
      - name: Download preserved IPA from a recent COMPLETED iOS run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p $RUNNER_TEMP/ipa-in
          # Find the latest COMPLETED iOS run (status=completed) that has an ipa-* artifact.
          # Picking the first ipa-* across the latest few completed runs to avoid grabbing
          # an in-progress run with no artifacts yet.
          RUN_ID=""
          ART_NAME=""
          for run in $(gh run list --workflow=ios.yml --limit 5 --status completed --json databaseId -q '.[].databaseId'); do
            for art in $(gh api repos/${{ github.repository }}/actions/runs/$run/artifacts --jq '.artifacts[] | select(.name | startswith("ipa-")) | .name' 2>/dev/null); do
              if [ -n "$art" ]; then
                RUN_ID=$run; ART_NAME=$art; break 2
              fi
            done
          done
          if [ -z "$RUN_ID" ]; then echo "::error::no ipa-* artifact found across last 5 completed ios.yml runs"; exit 1; fi
          echo "Source iOS run: $RUN_ID"
          echo "Artifact: $ART_NAME"
          gh run download $RUN_ID -n "$ART_NAME" --dir $RUNNER_TEMP/ipa-in
          ls -la $RUNNER_TEMP/ipa-in/
      - name: Write App Store Connect API key for fastlane
        env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/private_keys
          echo "$PRIVATE_KEY_B64" | base64 -d > ~/private_keys/AuthKey_${KEY_ID}.p8
          chmod 600 ~/private_keys/AuthKey_${KEY_ID}.p8
          cat > $RUNNER_TEMP/asc_api_key.json <<JSON
          { "key_id": "${KEY_ID}",
            "issuer_id": "${ISSUER_ID}",
            "key": "$(cat ~/private_keys/AuthKey_${KEY_ID}.p8 | sed 's/$/\\n/' | tr -d '\n')",
            "in_house": false,
            "is_key_content_base64": false }
          JSON
          echo "API key written to $RUNNER_TEMP/asc_api_key.json"
      - name: Upload via fastlane pilot (verbose)
        env:
          FASTLANE_HIDE_CHANGELOG: '1'
          FASTLANE_SKIP_UPDATE_CHECK: '1'
          FASTLANE_LOG_DEBUG: '1'
        run: |
          set -euo pipefail
          IPA=$(ls $RUNNER_TEMP/ipa-in/*.ipa | head -1)
          echo "Uploading: $IPA"
          fastlane run upload_to_testflight \
            api_key_path:$RUNNER_TEMP/asc_api_key.json \
            ipa:"$IPA" \
            skip_waiting_for_build_processing:false \
            skip_submission:true \
            app_identifier:cash.ping.app \
            verbose:true 2>&1 | tee /tmp/pilot.log
      - name: Preserve pilot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pilot-log-${{ github.run_number }}
          path: /tmp/pilot.log
          if-no-files-found: warn
