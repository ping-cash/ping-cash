apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ .Release.Name }} }
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ping-notify
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-notify
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: notify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports: [{ name: http, containerPort: {{ .Values.service.targetPort }} }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PORT, value: "{{ .Values.service.targetPort }}" }
            - name: WHATSAPP_PHONE_NUMBER_ID
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: WHATSAPP_PHONE_NUMBER_ID } }
            - name: WHATSAPP_ACCESS_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: WHATSAPP_ACCESS_TOKEN } }
            - name: TWILIO_ACCOUNT_SID
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_ACCOUNT_SID } }
            - name: TWILIO_AUTH_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_AUTH_TOKEN } }
            - name: TWILIO_FROM_NUMBER
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_FROM_NUMBER } }
          resources:
            requests: { cpu: {{ .Values.resources.requests.cpu }}, memory: {{ .Values.resources.requests.memory }} }
            limits:   { cpu: {{ .Values.resources.limits.cpu }},   memory: {{ .Values.resources.limits.memory }} }
          livenessProbe: { httpGet: { path: {{ .Values.healthcheck.liveness.path }}, port: http } }
          readinessProbe: { httpGet: { path: {{ .Values.healthcheck.readiness.path }}, port: http } }
