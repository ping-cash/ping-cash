# Add a tester to the Founders TestFlight group for Ping.
# Apple sends the invite email automatically on creation.

name: ASC Invite Tester to Founders
on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Tester email (the Apple ID that will receive the invite)'
        required: true
      first_name:
        description: 'First name (shown in the Apple invite email)'
        required: true
        default: 'Founder'
      last_name:
        description: 'Last name'
        required: true
        default: 'Baysal'
      bundle_id:
        description: 'Ping bundle ID (must match the App Store Connect app)'
        required: true
        default: 'cash.ping.app'
      group_name:
        description: 'Beta group name'
        required: true
        default: 'Founders'

jobs:
  invite:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID:    ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          TESTER_EMAIL: ${{ inputs.email }}
          TESTER_FIRST: ${{ inputs.first_name }}
          TESTER_LAST:  ${{ inputs.last_name }}
          BUNDLE_ID:    ${{ inputs.bundle_id }}
          GROUP_NAME:   ${{ inputs.group_name }}
        run: |
          python3 - <<'PYEOF'
          import os, base64, time, jwt, requests, json, sys
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try:
              key = base64.b64decode(key_b64, validate=False)
              if b'PRIVATE KEY' not in key:
                  key = key_b64.encode()
          except Exception:
              key = key_b64.encode()
          token = jwt.encode(
              { 'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1' },
              key, algorithm='ES256', headers={ 'kid': os.environ['KEY_ID'] })
          h = { 'Authorization': f'Bearer {token}',
                'Content-Type': 'application/json' }
          base = 'https://api.appstoreconnect.apple.com'

          # 1. Locate app + group
          bundle_id = os.environ['BUNDLE_ID']
          apps = requests.get(f'{base}/v1/apps?filter[bundleId]={bundle_id}',
              headers=h, timeout=20).json()
          if not apps.get('data'):
              print(f'::error::App with bundle ID {bundle_id} not in ASC — run bootstrap-asc.yml first')
              sys.exit(1)
          app_id = apps['data'][0]['id']
          groups = requests.get(f'{base}/v1/betaGroups?filter[app]={app_id}',
              headers=h, timeout=20).json()
          group_name = os.environ['GROUP_NAME']
          group = next((g for g in groups['data']
                        if g['attributes']['name'] == group_name), None)
          if not group:
              print(f'::error::Beta group "{group_name}" not found for app {app_id} — run bootstrap-asc.yml first')
              sys.exit(1)
          group_id = group['id']
          print(f'app_id={app_id}  group_id={group_id}')

          email = os.environ['TESTER_EMAIL']
          existing = requests.get(
              f'{base}/v1/betaTesters?filter[apps]={app_id}&filter[email]={email}&limit=1',
              headers=h, timeout=20).json()
          tester_id = existing.get('data', [{}])[0].get('id') if existing.get('data') else None
          print(f'existing_tester_id={tester_id}')

          if tester_id is None:
              body = {
                  'data': {
                      'type': 'betaTesters',
                      'attributes': {
                          'email': email,
                          'firstName': os.environ['TESTER_FIRST'],
                          'lastName':  os.environ['TESTER_LAST'],
                      },
                      'relationships': {
                          'betaGroups': {
                              'data': [{ 'type': 'betaGroups', 'id': group_id }],
                          },
                      },
                  }
              }
              r = requests.post(f'{base}/v1/betaTesters', headers=h,
                  data=json.dumps(body), timeout=20)
              print(f'create_tester status={r.status_code} body={r.text[:400]}')
              if r.status_code not in (200, 201):
                  sys.exit(1)
              print(f'NEW invite sent — check the inbox of {email}')
          else:
              body = { 'data': [ { 'type': 'betaTesters', 'id': tester_id } ] }
              r = requests.post(
                  f'{base}/v1/betaGroups/{group_id}/relationships/betaTesters',
                  headers=h, data=json.dumps(body), timeout=20)
              print(f'add_to_group status={r.status_code} body={r.text[:400]}')
              if r.status_code not in (200, 204, 422):
                  sys.exit(1)
              print(f'Tester already in ASC. Ensured "{group_name}" membership.')
          PYEOF
