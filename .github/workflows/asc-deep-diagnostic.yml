name: ASC Deep Diagnostic
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try: key = base64.b64decode(key_b64, validate=False)
          except: key = key_b64.encode()
          if b'PRIVATE KEY' not in key: key = key_b64.encode()
          token = jwt.encode({'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                              'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
                             key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}\n')

          def probe(label, path):
              r = requests.get(f'{base}{path}', headers=h)
              print(f'=== {label} ===')
              print(f'GET {path}')
              print(f'HTTP {r.status_code}')
              try: print(json.dumps(r.json(), indent=2)[:3000])
              except: print(r.text[:3000])
              print()

          # 1. App-level info — pricing, beta program registration, etc.
          probe('App attributes (full)',
                f'/v1/apps/{app_id}?fields[apps]=name,bundleId,primaryLocale,sku,contentRightsDeclaration,availableInNewTerritories,inAppPurchasesEnabled,subscriptionStatusUrl,subscriptionStatusUrlVersion')

          # 2. Beta app info — TestFlight requires this filled
          probe('Beta App Info', f'/v1/betaAppLocalizations?filter[app]={app_id}')
          probe('Beta Review Details',
                f'/v1/betaAppReviewDetails?filter[app]={app_id}')
          probe('Beta License Agreement',
                f'/v1/betaLicenseAgreements?filter[app]={app_id}')

          # 3. App Info (separate from Beta App Info — required for store)
          probe('App Infos', f'/v1/apps/{app_id}/appInfos')

          # 4. Build bundles for v36 — schemas to compare against future builds
          # (We already know v97/98/99 not in ASC; baseline is v36.)
          probe('v36 bundle deep-dive',
                f'/v1/builds/88f711fb-a9ff-46ef-8583-d6c48764141c?include=buildBundles,perfPowerMetrics,buildBetaDetail&fields[builds]=processingState,version,uploadedDate,expirationDate,minOsVersion,iconAssetToken,buildAudienceType,usesNonExemptEncryption')

          # 5. Build by exact CFBundleVersion query — maybe v99 has marketing version 0.1.0 but appears under different platform?
          probe('Builds filter version=99',
                f'/v1/builds?filter[app]={app_id}&filter[version]=99&limit=5')
          probe('Builds filter version=98',
                f'/v1/builds?filter[app]={app_id}&filter[version]=98&limit=5')
          probe('Builds filter version=97',
                f'/v1/builds?filter[app]={app_id}&filter[version]=97&limit=5')

          # 6. App pricing schedule — apps need this set for store + TestFlight
          probe('App Price Schedule',
                f'/v1/apps/{app_id}/appPriceSchedule')

          # 7. Bundle ID record — verify our cash.ping.app is properly registered
          probe('Bundle ID record',
                f'/v1/bundleIds?filter[identifier]=cash.ping.app')

          # 8. Any builds where processingState is NOT VALID
          probe('Builds processingState != VALID',
                f'/v1/builds?filter[app]={app_id}&filter[processingState]=PROCESSING,FAILED,INVALID&limit=20')
          PY
