<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Style 21: Classic 3D twisted ribbon infinity
       Continuous band with visible surface area, twisting at center
       Green loop in front, cyan loop behind -->

  <!-- Right loop ribbon (behind at crossing) - cyan -->
  <path d="
    M 17 13
    C 19.5 9  22.5 7  25 7
    C 28 7  31 10.5  31 16
    C 31 21.5  28 25  25 25
    C 22.5 25  19.5 23  17 19
    L 15 17.5
    C 17.5 21  21 23  24 23
    C 27 23  29 20.5  29 16
    C 29 11.5  27 9  24 9
    C 21 9  17.5 11  15 14.5
    Z
  " fill="#818CF8"/>

  <!-- Right loop ribbon darker edge (shows 3D depth) -->
  <path d="
    M 17 13
    C 19.5 9  22.5 7  25 7
    C 28 7  31 10.5  31 16
    C 31 21.5  28 25  25 25
    C 22.5 25  19.5 23  17 19
    L 15 17.5
    C 17.5 21  21 23  24 23
    C 27 23  29 20.5  29 16
    C 29 11.5  27 9  24 9
    C 21 9  17.5 11  15 14.5
    Z
  " fill="url(#shade-right-21)"/>

  <!-- Left loop ribbon (in front at crossing) - green -->
  <path d="
    M 15 19
    C 12.5 23  9.5 25  7 25
    C 4 25  1 21.5  1 16
    C 1 10.5  4 7  7 7
    C 9.5 7  12.5 9  15 13
    L 17 14.5
    C 14.5 11  11 9  8 9
    C 5 9  3 11.5  3 16
    C 3 20.5  5 23  8 23
    C 11 23  14.5 21  17 17.5
    Z
  " fill="#3B82F6"/>

  <!-- Left loop ribbon lighter highlight (shows 3D surface) -->
  <path d="
    M 15 19
    C 12.5 23  9.5 25  7 25
    C 4 25  1 21.5  1 16
    C 1 10.5  4 7  7 7
    C 9.5 7  12.5 9  15 13
    L 17 14.5
    C 14.5 11  11 9  8 9
    C 5 9  3 11.5  3 16
    C 3 20.5  5 23  8 23
    C 11 23  14.5 21  17 17.5
    Z
  " fill="url(#shade-left-21)"/>

  <defs>
    <linearGradient id="shade-right-21" x1="0.4" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="shade-left-21" x1="0.6" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
