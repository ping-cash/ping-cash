# DoD Method-1 surface: Receive tab phone | wallet toggle (ADR 0024).
#
# Pass criteria:
#   - Receive screen renders both Phone and Wallet modes
#   - Wallet mode exposes Solana address + copy button
#   - USDC/USDT warning visible
appId: cash.ping.app
---
# Prior sub-flow 04-send-screen.yaml ends on the /send stack screen
# (no tab bar visible — tab-Home is not in the AX tree from a stack
# screen). Pop the stack first with `back` so we're on (tabs) layout,
# then tab-Home is available.
- back
- back
- tapOn:
    id: 'tab-Home'
- extendedWaitUntil:
    visible:
      id: 'btn-Send'
    timeout: 8000
# Home tab has 4 fast-actions: Send, Receive, Add money, Swap.
# ActionTile component sets testID=`btn-${label}`.
- tapOn:
    id: 'btn-Receive'
- extendedWaitUntil:
    visible:
      id: 'receive-mode-phone'
    timeout: 8000
- tapOn:
    id: 'receive-mode-wallet'
- assertVisible:
    id: 'receive-wallet-address'
- assertVisible: 'Send USDC or USDT on Solana'
- tapOn:
    id: 'receive-mode-phone'
- assertVisible: 'YOUR PHONE'
- back
