apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ .Release.Name }} }
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ping-offramp
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-offramp
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: offramp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports: [{ name: http, containerPort: {{ .Values.service.targetPort }} }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PORT, value: "{{ .Values.service.targetPort }}" }
            - name: TRANSFI_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TRANSFI_API_KEY } }
            - name: TRANSFI_API_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TRANSFI_API_SECRET } }
            - name: TRANSFI_WEBHOOK_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TRANSFI_WEBHOOK_SECRET } }
            - name: WISE_API_KEY
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: WISE_API_KEY } }
            - name: WISE_WEBHOOK_SECRET
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: WISE_WEBHOOK_SECRET } }
          resources:
            requests: { cpu: {{ .Values.resources.requests.cpu }}, memory: {{ .Values.resources.requests.memory }} }
            limits:   { cpu: {{ .Values.resources.limits.cpu }},   memory: {{ .Values.resources.limits.memory }} }
          livenessProbe:
            httpGet: { path: {{ .Values.healthcheck.liveness.path }}, port: http }
          readinessProbe:
            httpGet: { path: {{ .Values.healthcheck.readiness.path }}, port: http }
