# DoD step 6: Swap USDC -> $PING via Jupiter route.
#
# Pass criteria:
#   - Swap screen renders
#   - Amount entry produces a live quote
#   - Confirm button reachable
appId: cash.ping.app
---
- tapOn:
    id: 'tab-Home'
- extendedWaitUntil:
    visible:
      id: 'btn-Send'
    timeout: 8000
- tapOn:
    id: 'btn-Swap'
- extendedWaitUntil:
    visible: 'USDC'
    timeout: 8000
- inputText: '0.5'
- hideKeyboard
- back
