version: "3.9"

name: cash-local

services:
  # ============================================
  # PostgreSQL (Ledger, Transfer, KYC)
  # ============================================
  postgres:
    image: postgres:16-alpine
    container_name: cash-postgres
    environment:
      POSTGRES_USER: cash
      POSTGRES_PASSWORD: cash
      POSTGRES_DB: cash
    ports:
      - "5433:5432"  # Using 5433 to avoid SSH tunnel conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cash"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # MongoDB (User, Claim, Notify)
  # ============================================
  mongodb:
    image: mongo:7
    container_name: cash-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cash
      MONGO_INITDB_ROOT_PASSWORD: cash
      MONGO_INITDB_DATABASE: cash
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis (Sessions, Cache, Rate Limiting)
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: cash-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redpanda (Kafka-compatible Event Streaming)
  # ============================================
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: cash-redpanda
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "18081:18081" # Schema Registry
      - "18082:18082" # Pandaproxy
      - "19092:19092" # Kafka
      - "19644:9644"  # Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================
  # Redpanda Console (Kafka UI)
  # ============================================
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.4.5
    container_name: cash-redpanda-console
    entrypoint: /bin/sh
    command: -c 'echo "$$CONSOLE_CONFIG_FILE" > /tmp/config.yml; /app/console'
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
      CONSOLE_CONFIG_FILE: |
        kafka:
          brokers: ["redpanda:9092"]
          schemaRegistry:
            enabled: true
            urls: ["http://redpanda:8081"]
        redpanda:
          adminApi:
            enabled: true
            urls: ["http://redpanda:9644"]
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy

  # ============================================
  # MailHog (Email Testing)
  # ============================================
  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: cash-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  # ============================================
  # Observability Stack
  # ============================================

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: cash-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    profiles:
      - observability

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:10.4.0
    container_name: cash-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    profiles:
      - observability

  # Loki (Logs)
  loki:
    image: grafana/loki:2.9.5
    container_name: cash-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    profiles:
      - observability

  # Tempo (Traces)
  tempo:
    image: grafana/tempo:2.4.1
    container_name: cash-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"   # Tempo
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - ./infrastructure/docker/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    profiles:
      - observability

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
  loki_data:
  tempo_data:

networks:
  default:
    name: cash-network
