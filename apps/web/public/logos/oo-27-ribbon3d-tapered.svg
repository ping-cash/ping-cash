<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Style 27: Tapered 3D ribbon - narrows at the center twist, widens at loops
       Creates elegant hourglass-like proportions at crossing -->

  <!-- Right loop ribbon (behind) - cyan, wider in loop, narrow at center -->
  <path d="
    M 16.5 14
    C 19 9  22.5 6  25 6
    C 28.5 6  31 10.5  31 16
    C 31 21.5  28.5 26  25 26
    C 22.5 26  19 23  16.5 18
    L 15.5 17.5
    C 17.5 21  21 24  24 24
    C 27.5 24  29.5 20.5  29.5 16
    C 29.5 11.5  27.5 8  24 8
    C 21 8  17.5 11  15.5 14.5
    Z
  " fill="#818CF8"/>

  <!-- Left loop ribbon (in front) - green, wider in loop, narrow at center -->
  <path d="
    M 15.5 18
    C 13 23  9.5 26  7 26
    C 3.5 26  1 21.5  1 16
    C 1 10.5  3.5 6  7 6
    C 9.5 6  13 9  15.5 14
    L 16.5 14.5
    C 14.5 11  11 8  8 8
    C 4.5 8  2.5 11.5  2.5 16
    C 2.5 20.5  4.5 24  8 24
    C 11 24  14.5 21  16.5 17.5
    Z
  " fill="#3B82F6"/>
</svg>
