server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from including internal port in redirects
    absolute_redirect off;
    port_in_redirect off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' https://analytics.openova.io; connect-src 'self' https://analytics.openova.io https://api.github.com; img-src 'self' data:; font-src 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types
        text/html
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Nova AI chat proxy → Axon (variable upstream avoids startup DNS failure)
    resolver 10.43.0.10 valid=30s;
    set $nova_upstream http://axon.axon.svc.cluster.local;

    location = /api/chat {
        proxy_pass $nova_upstream/v1/chat/completions;
        include /etc/nginx/nova/*.conf;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_set_header Content-Type 'application/json';

        # SSE streaming — disable ALL buffering layers
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 120s;
        gzip off;
        add_header X-Accel-Buffering no;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback for clean URLs
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404
    error_page 404 /404.html;
}
