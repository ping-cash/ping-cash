[package]
name = "internal-swap"
version = "0.1.0"
description = "Ping internal swap — USDC ↔ $PING at fixed 0.3% spread each side"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "internal_swap"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
# L-01 ADR 0018 guard (mirrors ping-token): mainnet-ready requires audit-passed
mainnet-ready = []
audit-passed = []

[dependencies]
anchor-lang = "0.30.1"
anchor-spl = { version = "0.30.1", features = ["token_2022"] }
