image:
  repository: ghcr.io/ping-cash/wallet-service
  tag: ""
  pullPolicy: IfNotPresent

replicas: 2

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }

service:
  port: 3003
  targetPort: 3003

secrets:
  external:
    enabled: true
    storeName: openbao-cluster
    paths:
      jwtSecret: ping/auth/jwt_secret
      solanaRpcUrl: ping/solana/rpc_url
      solanaUsdcMint: ping/solana/usdc_mint

istio:
  virtualService:
    enabled: true
    hosts:
      - api.ping.cash
    matchPrefix: /wallet
  destinationRule:
    enabled: true
    circuitBreaker:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s

metrics: { enabled: true, port: 9090, path: /metrics }

healthcheck:
  liveness: { path: /healthz, initialDelaySeconds: 5, periodSeconds: 30 }
  readiness: { path: /readyz, initialDelaySeconds: 5, periodSeconds: 10 }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
