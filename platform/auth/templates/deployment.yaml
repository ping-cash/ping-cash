apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ping-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: ping
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ping-auth
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-auth
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: auth
        app.kubernetes.io/part-of: ping
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "{{ .Values.metrics.path }}"
    spec:
      containers:
        - name: auth
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: "{{ .Values.service.targetPort }}"
            - name: LOG_LEVEL
              value: info
            # Secrets sourced from ExternalSecret (sealed by ESO from OpenBao)
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: TWILIO_ACCOUNT_SID }
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: TWILIO_AUTH_TOKEN }
            - name: TWILIO_VERIFY_SID
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: TWILIO_VERIFY_SID }
            - name: PRIVY_APP_ID
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: PRIVY_APP_ID }
            - name: PRIVY_APP_SECRET
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: PRIVY_APP_SECRET }
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: JWT_SECRET }
            - name: REDIS_URL
              valueFrom:
                secretKeyRef: { name: ping-auth-secrets, key: REDIS_URL }
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.healthcheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthcheck.readiness.periodSeconds }}
      restartPolicy: Always
