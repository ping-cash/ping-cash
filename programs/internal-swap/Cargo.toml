[package]
name = "internal-swap"
version = "0.1.0"
description = "Ping internal swap — USDC ↔ $PING at fixed 0.3% spread each side"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "internal_swap"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
# L-01 ADR 0018 guard (mirrors ping-token): mainnet-ready requires audit-passed
mainnet-ready = []
audit-passed = []

[dependencies]
anchor-lang = "0.30.1"
anchor-spl = { version = "0.30.1", features = ["token_2022"] }
# Pin solana-program to 1.18.17. solana-program 2.x split AccountInfo
# into a separate `solana-account-info` crate, which conflicts with
# pyth-sdk-solana's expected AccountInfo type. Pinning the old single-
# crate version keeps the Pyth integration's type signatures unified.
solana-program = "=1.18.17"
# Per #62 rebuild scope (ADR 0009 H-04): Pyth price-feed verification.
# Reads SOL/USDC + $PING/USD price accounts on swap-time. The pinned
# major.minor (0.10) tracks the Solana 1.18-compatible release; pinning
# patch via `=0.10.5` keeps reproducible builds deterministic for audit.
pyth-sdk-solana = "=0.10.5"

