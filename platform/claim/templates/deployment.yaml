apiVersion: apps/v1
kind: Deployment
metadata: { name: {{ .Release.Name }} }
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ping-claim
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-claim
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: claim
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports: [{ name: http, containerPort: {{ .Values.service.targetPort }} }]
          env:
            - { name: NODE_ENV, value: production }
            - { name: API_PORT, value: "{{ .Values.service.targetPort }}" }
            - name: REDIS_URL
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: REDIS_URL } }
            - name: TWILIO_ACCOUNT_SID
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_ACCOUNT_SID } }
            - name: TWILIO_AUTH_TOKEN
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_AUTH_TOKEN } }
            - name: TWILIO_VERIFY_SID
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: TWILIO_VERIFY_SID } }
            - name: CLAIM_URL_BASE
              valueFrom: { secretKeyRef: { name: {{ .Release.Name }}-secrets, key: CLAIM_URL_BASE } }
          resources:
            requests: { cpu: {{ .Values.resources.requests.cpu }}, memory: {{ .Values.resources.requests.memory }} }
            limits:   { cpu: {{ .Values.resources.limits.cpu }},   memory: {{ .Values.resources.limits.memory }} }
          livenessProbe:
            httpGet: { path: {{ .Values.healthcheck.liveness.path }}, port: http }
          readinessProbe:
            httpGet: { path: {{ .Values.healthcheck.readiness.path }}, port: http }
