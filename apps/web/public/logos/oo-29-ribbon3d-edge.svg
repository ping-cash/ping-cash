<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Style 29: 3D ribbon with visible edge - shows the thickness of the ribbon
       A darker strip along the inner edge represents the side/thickness of the band -->

  <!-- Right loop ribbon MAIN FACE (behind) - cyan -->
  <path d="
    M 17 13
    C 19.5 9  22.5 7  25 7
    C 28 7  31 10.5  31 16
    C 31 21.5  28 25  25 25
    C 22.5 25  19.5 23  17 19
    L 15 17.5
    C 17.5 21  21 23  24 23
    C 27 23  29 20.5  29 16
    C 29 11.5  27 9  24 9
    C 21 9  17.5 11  15 14.5
    Z
  " fill="#818CF8"/>

  <!-- Right loop EDGE STRIP (darker, shows ribbon thickness) -->
  <path d="
    M 15 17.5
    C 17.5 21  21 23  24 23
    C 27 23  29 20.5  29 16
    C 29 11.5  27 9  24 9
    C 21 9  17.5 11  15 14.5
    L 15.5 15
    C 18 11.5  21.5 9.5  24.5 9.5
    C 27 9.5  28.5 12  28.5 16
    C 28.5 20  27 22.5  24.5 22.5
    C 21.5 22.5  18 20.5  15.5 17
    Z
  " fill="#0891B2"/>

  <!-- Left loop ribbon MAIN FACE (in front) - green -->
  <path d="
    M 15 19
    C 12.5 23  9.5 25  7 25
    C 4 25  1 21.5  1 16
    C 1 10.5  4 7  7 7
    C 9.5 7  12.5 9  15 13
    L 17 14.5
    C 14.5 11  11 9  8 9
    C 5 9  3 11.5  3 16
    C 3 20.5  5 23  8 23
    C 11 23  14.5 21  17 17.5
    Z
  " fill="#3B82F6"/>

  <!-- Left loop EDGE STRIP (darker, shows ribbon thickness) -->
  <path d="
    M 17 14.5
    C 14.5 11  11 9  8 9
    C 5 9  3 11.5  3 16
    C 3 20.5  5 23  8 23
    C 11 23  14.5 21  17 17.5
    L 16.5 17
    C 14 20.5  10.5 22.5  7.5 22.5
    C 5 22.5  3.5 20  3.5 16
    C 3.5 12  5 9.5  7.5 9.5
    C 10.5 9.5  14 11.5  16.5 15
    Z
  " fill="#2563EB"/>
</svg>
