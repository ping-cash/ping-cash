{{- if .Values.secrets.external.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: ping-wallet
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: wallet
    app.kubernetes.io/part-of: ping
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: {{ .Values.secrets.external.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  data:
    - { secretKey: JWT_SECRET, remoteRef: { key: {{ .Values.secrets.external.paths.jwtSecret }} } }
    - { secretKey: SOLANA_RPC_URL, remoteRef: { key: {{ .Values.secrets.external.paths.solanaRpcUrl }} } }
    - { secretKey: SOLANA_USDC_MINT, remoteRef: { key: {{ .Values.secrets.external.paths.solanaUsdcMint }} } }
{{- end }}
