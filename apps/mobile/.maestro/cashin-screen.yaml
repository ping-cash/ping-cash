# DoD step 2: Cash-in via Onramper (ADR 0026). The Onramper widget runs
# in expo-web-browser external context — Maestro can't drive it. So we
# verify the pre-launch surface: amount entry + method tile + fee
# disclosure. The /webhooks/onramper sandbox branch completes the
# on-chain credit when synthetic checkout returns.
#
# Pass criteria:
#   - Amount input accepts numeric
#   - 3 method tiles render (Apple Pay, Card, Google Pay)
#   - Tap card → fee disclosure alert appears
appId: cash.ping.app
---
# receive-toggle.yaml ends with `back` returning to home tab.
- extendedWaitUntil:
    visible:
      id: 'btn-Add money'
    timeout: 25000
- tapOn:
    id: 'btn-Add money'
# iOS sim takes >8s to render the cashin screen — bump to 25s.
- extendedWaitUntil:
    visible:
      id: 'cashin-amount-input'
    timeout: 25000
- tapOn:
    id: 'cashin-amount-input'
- eraseText
- inputText: '25'
- hideKeyboard
- takeScreenshot: 11-cashin-amount-entered
- assertVisible:
    id: 'cashin-method-card'
- assertVisible:
    id: 'cashin-method-apple_pay'
- assertVisible:
    id: 'cashin-method-google_pay'
- takeScreenshot: 12-cashin-methods
- tapOn:
    id: 'back-button'
