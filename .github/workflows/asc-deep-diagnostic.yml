name: ASC Deep Diagnostic
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try: key = base64.b64decode(key_b64, validate=False)
          except: key = key_b64.encode()
          if b'PRIVATE KEY' not in key: key = key_b64.encode()
          token = jwt.encode({'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                              'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
                             key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']

          # Latest builds across ALL states
          r = requests.get(f'{base}/v1/builds?filter[app]={app_id}&sort=-uploadedDate&limit=10', headers=h).json()
          print('=== Latest 10 builds (ALL states sorted by uploadedDate desc) ===')
          for b in r.get('data', []):
              a = b.get('attributes', {})
              print(f"  v{a.get('version')}: state={a.get('processingState')} uploaded={a.get('uploadedDate')}")

          # All PRVs
          r = requests.get(f'{base}/v1/preReleaseVersions?filter[app]={app_id}&limit=20', headers=h).json()
          print(f'\n=== PRVs: {r.get("meta",{}).get("paging",{}).get("total","?")} total ===')
          for v in r.get('data', []):
              a = v['attributes']
              print(f"  v={a.get('version')} platform={a.get('platform')}")

          # State-by-state count
          print('\n=== Builds by processing state ===')
          for state in ['VALID', 'PROCESSING', 'FAILED', 'INVALID']:
              r = requests.get(f'{base}/v1/builds?filter[app]={app_id}&filter[processingState]={state}&limit=5', headers=h).json()
              total = r.get('meta', {}).get('paging', {}).get('total', '?')
              print(f"  {state}: {total} builds")
              for b in r.get('data', [])[:3]:
                  a = b['attributes']
                  print(f"    v{a.get('version')} uploaded={a.get('uploadedDate')}")
          PY
