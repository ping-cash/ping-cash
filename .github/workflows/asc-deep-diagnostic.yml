name: ASC Deep Diagnostic
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try: key = base64.b64decode(key_b64, validate=False)
          except: key = key_b64.encode()
          if b'PRIVATE KEY' not in key: key = key_b64.encode()
          token = jwt.encode({'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                              'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
                             key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}')

          def probe(label, path, slice_=4000):
              print(f'\n=== {label} ===\nGET {path}')
              r = requests.get(f'{base}{path}', headers=h)
              print(f'HTTP {r.status_code}')
              try:
                  print(json.dumps(r.json(), indent=2)[:slice_])
              except Exception:
                  print(r.text[:slice_])

          # 1. The relationship endpoint returned 200 last time — dump its full contents
          # to see which build IDs are actually linked to preReleaseVersion 0.1.0
          r = requests.get(f'{base}/v1/preReleaseVersions?filter[app]={app_id}&filter[version]=0.1.0&filter[platform]=IOS', headers=h).json()
          if r.get('data'):
              prv_id = r['data'][0]['id']
              print(f'\nPreReleaseVersion 0.1.0 id: {prv_id}')

              # Get build IDs linked to this PRV (relationship endpoint = id-only)
              probe('PRV→builds relationship (FULL)',
                    f'/v1/preReleaseVersions/{prv_id}/relationships/builds', slice_=8000)

              # Builds endpoint without invalid sort param
              probe('PRV→builds (no-sort)',
                    f'/v1/preReleaseVersions/{prv_id}/builds?limit=200&fields[builds]=version,processingState,uploadedDate,expired,buildAudienceType')

          # 2. App store versions — drop the invalid sort
          probe('App store versions (no-sort)',
                f'/v1/apps/{app_id}/appStoreVersions?limit=10&fields[appStoreVersions]=versionString,appStoreState,platform,createdDate')

          # 3. Beta app review submissions — use the right filter
          probe('Beta app review submissions (filter by app)',
                f'/v1/betaAppReviewSubmissions?filter[build]={app_id}&limit=10')

          # 4. App price schedule body
          probe('App price schedule (full body)',
                f'/v1/apps/{app_id}/appPriceSchedule')

          # 5. Latest build's buildBundles content — does v36 have buildBundles?
          r = requests.get(f'{base}/v1/builds?filter[app]={app_id}&sort=-uploadedDate&limit=1', headers=h).json()
          if r.get('data'):
              build_id = r['data'][0]['id']
              print(f'\nLatest build id (v36): {build_id}')
              probe('v36 buildBundles', f'/v1/builds/{build_id}/buildBundles')
              probe('v36 individualTesters', f'/v1/builds/{build_id}/individualTesters?limit=5')
              probe('v36 betaGroups', f'/v1/builds/{build_id}/betaGroups?limit=5')
              probe('v36 betaBuildLocalizations',
                    f'/v1/betaBuildLocalizations?filter[build]={build_id}')

          # 6. App-level info with valid fields only
          probe('App full info',
                f'/v1/apps/{app_id}?fields[apps]=name,bundleId,primaryLocale,sku,contentRightsDeclaration,availableInNewTerritories')

          # 7. Test agreements/banking via different path — appEncryption + appPricePoints
          probe('App encryption declarations',
                f'/v1/appEncryptionDeclarations?filter[app]={app_id}&limit=5')
          PY
