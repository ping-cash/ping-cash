appId: cash.ping.app
---
# After /auth/verify the dashboard hydrates. Wait on the Send button's
# auto-generated testID — text-find on the "Good morning/afternoon/etc."
# greeting was unreliable on iOS Maestro (iOS Build f1fccbd 2026-05-29:
# screen rendered with "Good afternoon" + $5 USDC balance visible in the
# capture, but Maestro's AX tree query for the 'Good' substring timed
# out at 25s). testID-bound assertions (Button component auto-sets
# resource-id={`btn-${label}`}) are deterministic on the accessibility
# tree regardless of font/color/role nuances.
- extendedWaitUntil:
    visible:
      id: 'btn-Send'
    timeout: 25000
- takeScreenshot: 04-home
- assertVisible:
    id: 'btn-Add money'
# Quick tab walk — each must render without crash. Use the tab-bar
# accessibility labels which expo-router sets from the screen title.
- tapOn: 'Activity'
- extendedWaitUntil:
    visible:
      text: '(Activity|Recent|No transfers|No activity)'
      enabled: true
    timeout: 8000
- takeScreenshot: 05-history
- tapOn: 'Earn'
- extendedWaitUntil:
    visible: 'APY'
    timeout: 8000
- takeScreenshot: 06-vault
- tapOn: 'Profile'
- extendedWaitUntil:
    visible: 'Sign out'
    timeout: 8000
- takeScreenshot: 07-profile
- tapOn: 'Home'
