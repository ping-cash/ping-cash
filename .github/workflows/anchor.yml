name: Anchor

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - '.github/workflows/anchor.yml'
  pull_request:
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'

permissions:
  contents: read

jobs:
  anchor-build:
    name: anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.79.0 (anchor 0.30.1 cargo compat — lockfile v3)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.79.0
          components: rustfmt, clippy

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.17/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor
        run: |
          cargo install --locked --git https://github.com/coral-xyz/anchor avm
          avm install 0.30.1
          avm use 0.30.1

      - name: Install Node deps
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile

      - name: anchor build
        run: anchor build

      - name: anchor test
        run: anchor test --skip-build
