image: { repository: ghcr.io/ping-cash/transfer-service, tag: "" }
replicas: 2
resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 500m, memory: 256Mi }
service: { port: 3000, targetPort: 3000 }
secrets:
  external:
    enabled: true
    storeName: openbao-cluster
    paths:
      postgresUrl: ping/transfer-svc/postgres_url
      kafkaBrokers: ping/redpanda/brokers
      jwtSecret: ping/auth/jwt_secret
istio:
  virtualService:
    enabled: true
    hosts: [api.ping.cash]
    matchPrefix: /transfers
healthcheck:
  liveness: { path: /health/live, initialDelaySeconds: 5, periodSeconds: 30 }
  readiness: { path: /health/ready, initialDelaySeconds: 5, periodSeconds: 10 }
