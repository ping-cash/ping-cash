name: ASC Deep Diagnostic
on: { workflow_dispatch: {} }
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PY'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try: key = base64.b64decode(key_b64, validate=False)
          except: key = key_b64.encode()
          if b'PRIVATE KEY' not in key: key = key_b64.encode()
          token = jwt.encode({'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
                              'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
                             key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']
          print(f'App ID: {app_id}')

          # 1. ALL builds (no state filter) — show PROCESSING / INVALID / etc.
          r = requests.get(f'{base}/v1/builds?filter[app]={app_id}&sort=-uploadedDate&limit=20', headers=h).json()
          print(f'\n=== Last 20 builds (ALL states) ===')
          for b in r.get('data', []):
              a = b.get('attributes', {})
              print(f"  v{a.get('version')}: processing={a.get('processingState')} uploaded={a.get('uploadedDate')} expired={a.get('expired')}")

          # 2. Look for builds uploaded in last 4 hours (covers today's attempts)
          import datetime
          cutoff = (datetime.datetime.utcnow() - datetime.timedelta(hours=4)).isoformat() + 'Z'
          r = requests.get(f'{base}/v1/builds?filter[app]={app_id}&filter[uploadedDate]={cutoff}&sort=-uploadedDate&limit=20', headers=h)
          print(f'\n=== Builds uploaded in last 4 hours (any state) ===')
          print(f'HTTP {r.status_code}; body 200chars: {r.text[:200]}')

          # 3. Pre-release versions — these include builds being prepped for review
          r = requests.get(f'{base}/v1/preReleaseVersions?filter[app]={app_id}&sort=-version&limit=10', headers=h).json()
          print(f'\n=== Pre-release versions ===')
          for v in r.get('data', []):
              a = v.get('attributes', {})
              print(f"  v={a.get('version')} platform={a.get('platform')}")

          # 4. App-level info — review status, content rights, age rating etc.
          r = requests.get(f'{base}/v1/apps/{app_id}?fields[apps]=availableInNewTerritories,contentRightsDeclaration,name,primaryLocale,sku,subscriptionStatusUrlForSandbox,subscriptionStatusUrl,subscriptionStatusUrlVersion,subscriptionStatusUrlVersionForSandbox', headers=h)
          print(f'\n=== App-level info ===')
          print(f'HTTP {r.status_code}')
          print(json.dumps(r.json().get('data', {}).get('attributes', {}), indent=2)[:800])

          # 5. Current user info via /v1/users/me (NOT exposed by ASC API directly — instead /v1/users)
          r = requests.get(f'{base}/v1/users', headers=h)
          print(f'\n=== Team users + roles ===')
          for u in r.json().get('data', [])[:5]:
              a = u.get('attributes', {})
              print(f"  {a.get('firstName')} {a.get('lastName')} <{a.get('username')}> roles={a.get('roles')}")

          # 6. Subscriptions / agreements — try the agreementHolder relation
          # Apple Developer Agreement signature is exposed through /v1/agreements? on some account types
          for endpoint in ['/v1/agreements', '/v1/paidAppsAgreements', '/v1/subscriptionGroups']:
              r = requests.get(f'{base}{endpoint}', headers=h)
              print(f'\n=== {endpoint} ===')
              print(f'HTTP {r.status_code}')
              if r.status_code == 200:
                  print(json.dumps(r.json(), indent=2)[:500])
              else:
                  print(r.text[:300])
          PY
