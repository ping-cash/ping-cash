# DoD Method-1 surface: Receive tab phone | wallet toggle (ADR 0024).
#
# Pass criteria:
#   - Receive screen renders both Phone and Wallet modes
#   - Wallet mode exposes Solana address + copy button
#   - USDC/USDT warning visible
appId: cash.ping.app
---
# Per 00-all.yaml ordering this runs immediately after 03-tabs.yaml
# which ends with tap tab-Home. ActionTile on home sets testID=
# `btn-${label}`. iOS sim takes ~10-20s to fully render dashboard
# after auth (per 03-tabs.yaml comment about 25s waits); use the
# same 25s timeout pattern as the existing 03-tabs.yaml proven flow.
- extendedWaitUntil:
    visible:
      id: 'btn-Receive'
    timeout: 25000
- tapOn:
    id: 'btn-Receive'
- extendedWaitUntil:
    visible:
      id: 'receive-mode-phone'
    timeout: 8000
- tapOn:
    id: 'receive-mode-wallet'
- assertVisible:
    id: 'receive-wallet-address'
- tapOn:
    id: 'receive-mode-phone'
# Use explicit testID-anchored back button instead of Maestro's `back`
# action — the latter is unreliable on iOS sim for stack screens that
# use custom (non-system-default) back chevrons.
- tapOn:
    id: 'back-button'
