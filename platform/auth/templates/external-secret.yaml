{{- if .Values.secrets.external.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: ping-auth
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: ping
spec:
  refreshInterval: 60s
  secretStoreRef:
    name: {{ .Values.secrets.external.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: TWILIO_ACCOUNT_SID
      remoteRef:
        key: {{ .Values.secrets.external.paths.twilioAccountSid }}
    - secretKey: TWILIO_AUTH_TOKEN
      remoteRef:
        key: {{ .Values.secrets.external.paths.twilioAuthToken }}
    - secretKey: TWILIO_VERIFY_SID
      remoteRef:
        key: {{ .Values.secrets.external.paths.twilioVerifySid }}
    - secretKey: PRIVY_APP_ID
      remoteRef:
        key: {{ .Values.secrets.external.paths.privyAppId }}
    - secretKey: PRIVY_APP_SECRET
      remoteRef:
        key: {{ .Values.secrets.external.paths.privyAppSecret }}
    - secretKey: JWT_SECRET
      remoteRef:
        key: {{ .Values.secrets.external.paths.jwtSecret }}
    - secretKey: REDIS_URL
      remoteRef:
        key: {{ .Values.secrets.external.paths.redisUrl }}
{{- end }}
