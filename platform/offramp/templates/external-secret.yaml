{{- if .Values.secrets.external.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata: { name: {{ .Release.Name }}-secrets }
spec:
  refreshInterval: 60s
  secretStoreRef: { name: {{ .Values.secrets.external.storeName }}, kind: ClusterSecretStore }
  target: { name: {{ .Release.Name }}-secrets, creationPolicy: Owner }
  data:
    - { secretKey: TRANSFI_API_KEY, remoteRef: { key: {{ .Values.secrets.external.paths.transfiApiKey }} } }
    - { secretKey: TRANSFI_API_SECRET, remoteRef: { key: {{ .Values.secrets.external.paths.transfiApiSecret }} } }
    - { secretKey: TRANSFI_WEBHOOK_SECRET, remoteRef: { key: {{ .Values.secrets.external.paths.transfiWebhookSecret }} } }
    - { secretKey: WISE_API_KEY, remoteRef: { key: {{ .Values.secrets.external.paths.wiseApiKey }} } }
    - { secretKey: WISE_WEBHOOK_SECRET, remoteRef: { key: {{ .Values.secrets.external.paths.wiseWebhookSecret }} } }
{{- end }}
