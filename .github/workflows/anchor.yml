name: Anchor

on:
  push:
    branches: [main]
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'
      - '.github/workflows/anchor.yml'
  pull_request:
    paths:
      - 'programs/**'
      - 'tests/**'
      - 'Anchor.toml'

permissions:
  contents: read

jobs:
  anchor-build:
    name: anchor build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89.0 (needed by darling 0.23 / serde_with 3.20 pulled in by solana 2.1.x via anchor 0.31.x — #71)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy

      - name: Install Solana CLI (3.1.14 — bundled cargo 1.85+ supports edition2024 needed by hybrid-array 0.4 transitive dep via spl-program-error 0.6)
        run: |
          # Worker tried 3.1.14 earlier (commit 206a1cd) but hit borsh-trait
          # split caused by pyth-solana-receiver-sdk@1.0.1 in dep graph.
          # 1495384 reverted pyth-receiver → split should no longer exist.
          # 7379217 stepped solana down to 2.2.16 which DOES NOT fix
          # edition2024 (cargo 1.84). Step back up to 3.1.14 to clear it.
          # Note: anchor's `cargo build-sbf` uses solana's bundled cargo,
          # not the rustup-installed 1.89.0 — so the solana CLI version
          # IS the cargo version for SBF compilation.
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor (0.31.1 — #71 toolchain bump)
        run: |
          # anchor-cli 0.31.x uses solana-program 2.x so the AccountInfo
          # type unifies with pyth-solana-receiver-sdk 1.0.1 — removes
          # the cfg-gated pyth-real feature flag entirely. avm at 0.31.1
          # doesn't exist on crates.io; install anchor-cli directly.
          cargo install --locked --version 0.31.1 anchor-cli
          anchor --version

      - name: Install Node deps
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: pnpm/action-setup@v3
        with: { version: 9 }
      - run: pnpm install --frozen-lockfile

      - name: anchor build
        run: anchor build

      - name: anchor test
        run: anchor test --skip-build
