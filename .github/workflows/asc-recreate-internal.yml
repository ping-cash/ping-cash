name: ASC Recreate Founders as Internal
on: { workflow_dispatch: {} }
jobs:
  recreate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, base64, time, jwt, requests, json, sys
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try:
              key = base64.b64decode(key_b64, validate=False)
              if b'PRIVATE KEY' not in key: key = key_b64.encode()
          except Exception: key = key_b64.encode()
          token = jwt.encode(
              {'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}', 'Content-Type': 'application/json'}
          base = 'https://api.appstoreconnect.apple.com'

          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']

          # Delete any existing external Founders group
          groups = requests.get(f'{base}/v1/betaGroups?filter[app]={app_id}', headers=h).json()
          for g in groups['data']:
              if g['attributes']['name'] == 'Founders' and not g['attributes'].get('isInternalGroup'):
                  r = requests.delete(f'{base}/v1/betaGroups/{g["id"]}', headers=h, timeout=20)
                  print(f'Deleted external Founders {g["id"]}: status={r.status_code}')
              elif g['attributes']['name'] == 'Founders' and g['attributes'].get('isInternalGroup'):
                  print(f'Internal Founders already exists: {g["id"]}')

          # Create new INTERNAL Founders group — NO builds relationship (Apple
          # rejects 'Cannot add internal group to a build'; internal groups
          # auto-receive all builds).
          body = {
              'data': {
                  'type': 'betaGroups',
                  'attributes': {
                      'name': 'Founders',
                      'isInternalGroup': True,
                      'publicLinkEnabled': False,
                  },
                  'relationships': {
                      'app': {'data': {'type': 'apps', 'id': app_id}},
                  }
              }
          }
          r = requests.post(f'{base}/v1/betaGroups', headers=h, data=json.dumps(body), timeout=20)
          print(f'create_internal status={r.status_code} body={r.text[:600]}')
          if r.status_code not in (200, 201):
              # If 409/422 because already exists, find it
              groups = requests.get(f'{base}/v1/betaGroups?filter[app]={app_id}', headers=h).json()
              internal = next((g for g in groups['data']
                               if g['attributes']['name'] == 'Founders'
                               and g['attributes'].get('isInternalGroup')), None)
              if not internal:
                  print('::error::Failed to create OR locate internal group'); sys.exit(1)
              gid = internal['id']
          else:
              gid = r.json()['data']['id']
          print(f'Internal Founders group id={gid}')

          # Add emrahbaysal@gmail.com as tester
          body = {
              'data': {
                  'type': 'betaTesters',
                  'attributes': {
                      'email': 'emrahbaysal@gmail.com',
                      'firstName': 'Emrah', 'lastName': 'Baysal',
                  },
                  'relationships': {
                      'betaGroups': {'data': [{'type': 'betaGroups', 'id': gid}]},
                  },
              }
          }
          r = requests.post(f'{base}/v1/betaTesters', headers=h, data=json.dumps(body), timeout=20)
          print(f'add_tester status={r.status_code} body={r.text[:400]}')
          if r.status_code == 409:
              # Already exists — just add to new group
              existing = requests.get(
                  f'{base}/v1/betaTesters?filter[apps]={app_id}&filter[email]=emrahbaysal@gmail.com&limit=1',
                  headers=h).json()
              if existing.get('data'):
                  tid = existing['data'][0]['id']
                  body = {'data': [{'type': 'betaTesters', 'id': tid}]}
                  r = requests.post(f'{base}/v1/betaGroups/{gid}/relationships/betaTesters',
                      headers=h, data=json.dumps(body), timeout=20)
                  print(f'add_to_internal status={r.status_code}')
          print('DONE')
          PYEOF
