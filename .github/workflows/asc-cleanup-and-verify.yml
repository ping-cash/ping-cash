name: ASC Cleanup Duplicate + Verify Tester
on: { workflow_dispatch: {} }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyjwt cryptography requests
      - env:
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          PRIVATE_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          python3 - <<'PYEOF'
          import os, base64, time, jwt, requests, json
          key_b64 = os.environ['PRIVATE_KEY_B64']
          try:
              key = base64.b64decode(key_b64, validate=False)
              if b'PRIVATE KEY' not in key: key = key_b64.encode()
          except Exception: key = key_b64.encode()
          token = jwt.encode(
              {'iss': os.environ['ISSUER_ID'], 'iat': int(time.time()),
               'exp': int(time.time())+1200, 'aud': 'appstoreconnect-v1'},
              key, algorithm='ES256', headers={'kid': os.environ['KEY_ID']})
          h = {'Authorization': f'Bearer {token}'}
          base = 'https://api.appstoreconnect.apple.com'
          apps = requests.get(f'{base}/v1/apps?filter[bundleId]=cash.ping.app', headers=h).json()
          app_id = apps['data'][0]['id']

          print('--- ALL BETA GROUPS ---')
          groups = requests.get(f'{base}/v1/betaGroups?filter[app]={app_id}&include=betaTesters', headers=h).json()
          internal_groups = []
          for g in groups.get('data', []):
              attrs = g['attributes']
              print(f"  {attrs['name']} id={g['id']} internal={attrs.get('isInternalGroup')} createdDate={attrs.get('createdDate')}")
              if attrs.get('isInternalGroup'):
                  internal_groups.append(g)

          # Find empty internal groups (no testers) to delete
          for g in internal_groups:
              rels = g.get('relationships', {})
              testers = rels.get('betaTesters', {}).get('data', [])
              if not testers and len(internal_groups) > 1:
                  rd = requests.delete(f'{base}/v1/betaGroups/{g["id"]}', headers={'Authorization': f'Bearer {token}'}, timeout=20)
                  print(f"  Deleted empty duplicate {g['id']}: status={rd.status_code}")

          print('\n--- TESTER STATE ---')
          testers = requests.get(f'{base}/v1/betaTesters?filter[apps]={app_id}', headers=h).json()
          for t in testers.get('data', []):
              a = t['attributes']
              print(f"  {a.get('email')} state={a.get('state')} inviteType={a.get('inviteType')}")
          PYEOF
